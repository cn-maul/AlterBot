# docker compose for Gentry
#
# 快速启动:
#   docker compose up -d
#   docker compose logs -f
#
# 访问 http://localhost:8889 进入管理界面
#
# 数据持久化在 gentry-data 卷中（包含 SQLite 数据库）
# 停止: docker compose down
# 完全删除（含数据）: docker compose down -v

services:
  gentry:
    build:
      context: .
      dockerfile: Dockerfile
      # args:
        #   GO_VERSION: 1.26-alpine
    image: gentry:latest
    container_name: gentry
    restart: unless-stopped
    ports:
      - "8889:8889"
    volumes:
      # SQLite 数据库持久化
      - gentry-data:/app/data
      # （可选）挂载推送通知配置
      # - ./config.json:/app/data/config.json:ro
    environment:
      - GIN_MODE=release
      - PORT=8889
      # 设置时区（可选，默认 UTC）
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  gentry-data:
